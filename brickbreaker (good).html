<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BrickBreaker</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #292e37; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #game { display: block; position: absolute; inset: 0; }
  #overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10, 12, 16, 0.72);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: opacity .25s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .panel {
    text-align: center; color: #fff; padding: 32px 40px;
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  .panel h1 {
    font-size: 46px; font-weight: 700; margin: 0 0 8px; letter-spacing: 1px;
    text-shadow: 0 3px 14px rgba(0,0,0,.55);
  }
  .panel p { color: #9fb0c3; margin: 0 0 28px; font-size: 17px; }
  .panel button {
    display: block; width: 260px; margin: 12px auto; padding: 14px 0;
    font-size: 18px; font-weight: 600; font-family: inherit; color: #fff;
    background: #3a4353; border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px; cursor: pointer;
    transition: background .15s, transform .08s;
  }
  .panel button:hover { background: #4a5670; }
  .panel button:active { transform: scale(.96); }
  .panel button.primary { background: #3b82c4; border-color: transparent; }
  .panel button.primary:hover { background: #4a93d8; }
  #hint {
    position: absolute; bottom: 12px; left: 0; width: 100%; z-index: 5;
    text-align: center; pointer-events: none;
    color: rgba(255,255,255,.32);
    font: 13px "Avenir Next", "Segoe UI", system-ui, sans-serif;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">Move: mouse / finger / arrow keys &nbsp;&middot;&nbsp; Pause: top-left button or Esc</div>
<div id="overlay" class="hidden">
  <div class="panel">
    <h1 id="menu-title"></h1>
    <p id="menu-sub"></p>
    <div id="menu-buttons"></div>
  </div>
</div>

<script>
'use strict';

/* ===================== Config ===================== */
const PADDLE_SPEED   = 20;
const MIN_BALL_SPEED = 4;
const MAX_BALL_SPEED = 6;
const BRICK_SPEEDUP  = 0.005;
const LEVEL_SPEEDUP  = 1.0;
const POWERUP_CHANCE = 0.18;
const FILTER_NAMES   = ['None', 'Gray', 'B&W', 'LCD', 'Wavy'];
const HUD_H          = 90;
const START_LIVES    = 3;

/* ===================== Levels & colors ===================== */
const COLORS = {
  R: '#e5534b', O: '#e8863b', Y: '#e7c341', G: '#46b96b',
  B: '#3f8fce', P: '#9a63c9', C: '#3fbfae', S: '#c3cbd4'
};
const LEVELS = [
  [ "RRRRRRRRR",
    "OOOOOOOOO",
    "YYYYYYYYY",
    "GGGGGGGGG",
    "BBBBBBBBB" ],
  [ "    R    ",
    "   OOO   ",
    "  YYYYY  ",
    " GGGGGGG ",
    "BBBBBBBBB",
    " GGGGGGG ",
    "  YYYYY  ",
    "   OOO   ",
    "    R    " ],
  [ "R R R R R",
    " O O O O ",
    "Y Y Y Y Y",
    " G G G G ",
    "B B B B B",
    " P P P P " ],
  [ "ROYGBPCRO",
    "ROYGBPCRO",
    "ROYGBPCRO",
    "ROYGBPCRO",
    "ROYGBPCRO",
    "ROYGBPCRO" ],
  [ "SSSSSSSSS",
    "S       S",
    "S OOOOO S",
    "S O   O S",
    "S O Y O S",
    "S O   O S",
    "S OOOOO S",
    "S       S",
    "SSSSSSSSS" ],
  [ "  G   G  ",
    " GGGGGGG ",
    "GG GGG GG",
    "GGGGGGGGG",
    " GGGGGGG ",
    " G G G G " ],
  [ "BBBBBBBBB",
    " B     B ",
    "  B   B  ",
    "   B B   ",
    "    B    ",
    "   B B   ",
    "  B   B  ",
    " B     B ",
    "BBBBBBBBB" ]
];

/* ===================== Sound ===================== */
const AudioSys = {
  ctx: null,
  ensure() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  tone(freq, dur, type, vol, slideTo, delay) {
    if (!this.ctx) return;
    type = type || 'square'; vol = vol || 0.12; delay = delay || 0;
    const t0 = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t0); o.stop(t0 + dur + 0.03);
  },
  brick()        { this.tone(220, 0.08, 'square', 0.09); },
  paddle(power)  { power ? this.tone(900, 0.12, 'sawtooth', 0.09, 420)
                         : this.tone(520, 0.07, 'triangle', 0.14); },
  wall()         { this.tone(160, 0.05, 'sine', 0.10); },
  powerupCatch() { [660, 880, 1320].forEach((f, i) => this.tone(f, 0.09, 'square', 0.07, null, i * 0.06)); },
  laser()        { this.tone(1200, 0.18, 'sawtooth', 0.07, 200); },
  phaser()       { this.tone(300, 0.25, 'sine', 0.09, 1200); },
  levelUp()      { [523, 659, 784].forEach((f, i) => this.tone(f, 0.12, 'triangle', 0.12, null, i * 0.09)); },
  ballLost()     { [440, 349, 262].forEach((f, i) => this.tone(f, 0.15, 'triangle', 0.11, null, i * 0.11)); }
};

/* ===================== Helpers ===================== */
const rand   = (a, b) => a + Math.random() * (b - a);
const randint = (a, b) => Math.floor(rand(a, b + 1));
const clamp  = (v, a, b) => Math.max(a, Math.min(b, v));
const sign   = v => (v > 0) - (v < 0);

function hsv(h, s, v) {
  h = ((h % 1) + 1) % 1;
  const i = Math.floor(h * 6), f = h * 6 - i;
  const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    default: r = v; g = p; b = q;
  }
  return 'rgb(' + Math.round(r * 255) + ',' + Math.round(g * 255) + ',' + Math.round(b * 255) + ')';
}

function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * f), 0, 255);
  const g = clamp(Math.round(((n >> 8) & 255) * f), 0, 255);
  const b = clamp(Math.round((n & 255) * f), 0, 255);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function easeOutBack(x) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
}

function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

/* Collision helpers */
function closestPoint(rect, cx, cy) {
  return [clamp(cx, rect.x, rect.x + rect.w), clamp(cy, rect.y, rect.y + rect.h)];
}
function hitRect(rect, cx, cy, radius) {
  const p = closestPoint(rect, cx, cy);
  const dx = p[0] - cx, dy = p[1] - cy;
  return dx * dx + dy * dy < radius * radius;
}
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ===================== Game state ===================== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const off = document.createElement('canvas');
const octx = off.getContext('2d');

let W = 0, H = 0, DPR = 1;

const G = {
  state: 'menu',
  filter: 0,
  score: 0, level: 0, highscore: 0,
  lives: START_LIVES,
  paddlePowerup: 0,
  paddleCharge: 0,
  t: 0, levelStart: 0,
  bricks: [], balls: [], powerups: [], particles: [],
  paddle: { x: 0, y: 0, w: 130, h: 20, target: 0 },
  ballR: 11, speedScale: 1,
  brickW: 64, brickH: 32,
  walls: []
};
const keys = new Set();

class Ball {
  constructor(x, y, r) {
    this.x = x; this.y = y; this.r = r;
    this.vx = 0; this.vy = 0;
    this.speed = MIN_BALL_SPEED;
    this.lastCollision = null;
    this.isNew = true;
    this.powerupType = 0;
    this.spawnAge = 0;
  }
}

/* ===================== Layout / resizing ===================== */
function positionBrick(b) {
  const bw = G.brickW, bh = G.brickH;
  b.w = bw; b.h = bh;
  b.x = W / 2 - 4.5 * bw + b.gx * bw + bw / 2;
  b.y = H / 2 - b.rows * bh / 2 + b.gy * bh + bh / 2;
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  off.width = canvas.width; off.height = canvas.height;

  const big = W > 760;
  G.ballR = big ? 11 : 7;
  G.speedScale = big ? 1.0 : 0.65;
  G.paddle.w = clamp(W * 0.17, 80, 140);
  G.paddle.h = Math.max(14, G.paddle.w * 0.16);
  G.paddle.y = H - (big ? 120 : 70);
  G.brickW = Math.min(64, Math.floor((W - 24) / 9));
  G.brickH = Math.max(12, Math.round(G.brickW / 2));
  G.paddle.x = clamp(G.paddle.x || W / 2, G.paddle.w / 2, W - G.paddle.w / 2);
  G.paddle.target = clamp(G.paddle.target || W / 2, 0, W);
  for (const b of G.bricks) positionBrick(b);
  G.walls = [
    { x: -200, y: -200, w: 200, h: H + 400 },
    { x: W, y: -200, w: 200, h: H + 400 },
    { x: -200, y: -200, w: W + 400, h: 200 + HUD_H }
  ];
}

function paddleRect(expand) {
  const p = G.paddle, e = expand ? 1 : 0;
  return { x: p.x - p.w / 2 - 10 * e, y: p.y - p.h / 2 - 5 * e,
           w: p.w + 20 * e, h: p.h + 10 * e };
}

/* ===================== Highscore ===================== */
function loadHigh() {
  try { G.highscore = parseInt(localStorage.getItem('brickbreaker_highscore'), 10) || 0; }
  catch (e) { G.highscore = 0; }
}
function saveHigh() {
  try { localStorage.setItem('brickbreaker_highscore', String(G.highscore)); } catch (e) {}
}

/* ===================== Game flow ===================== */
function newGame() {
  G.level = 0; G.score = 0; G.lives = START_LIVES;
  G.paddlePowerup = 0; G.paddleCharge = 0;
  G.bricks = []; G.balls = []; G.powerups = []; G.particles = [];
  spawnBall();
  loadLevel(LEVELS[0]);
}

function loadLevel(lines) {
  G.bricks = [];
  const n = lines.length;
  for (let row = 0; row < n; row++) {
    for (let col = 0; col < lines[row].length; col++) {
      const ch = lines[row][col];
      if (ch === ' ') continue;
      const b = { gx: col, gy: row, rows: n, type: ch,
                  color: COLORS[ch] || COLORS.R,
                  age: 0, delay: G.bricks.length * 0.01 };
      positionBrick(b);
      G.bricks.push(b);
    }
  }
  G.levelStart = G.t;
}

function spawnBall() {
  const b = new Ball(W / 2, G.paddle.y - 100, G.ballR);
  b.speed = Math.min(MAX_BALL_SPEED, MIN_BALL_SPEED + LEVEL_SPEEDUP * G.level);
  b.vx = 0;
  b.vy = b.speed * G.speedScale * 0.4;
  G.balls.push(b);
}

function ballLost() {
  AudioSys.ballLost();
  G.lives--;
  if (G.lives <= 0) gameOver();
  else spawnBall();
}

function gameOver() {
  if (G.score > G.highscore) { G.highscore = G.score; saveHigh(); }
  G.state = 'over';
  showMenu('Game Over', 'Score: ' + G.score + '   &middot;   Highscore: ' + G.highscore,
           ['New Game', 'Filter: ' + FILTER_NAMES[G.filter]]);
}

function levelFinished() {
  G.score += Math.max(0, 100 - Math.floor(G.t - G.levelStart)) * (G.level + 1);
  G.level++;
  AudioSys.levelUp();
  G.balls = []; G.powerups = [];
  spawnBall();
  loadLevel(LEVELS[G.level % LEVELS.length]);
}

/* ===================== Bricks / powerups ===================== */
function destroyBrick(ball, brick, withPowerup) {
  if (withPowerup === undefined) withPowerup = true;
  const idx = G.bricks.indexOf(brick);
  if (idx < 0) return;
  G.bricks.splice(idx, 1);
  explode(brick);
  G.score += 10 * (G.level + 1);
  ball.speed = Math.min(MAX_BALL_SPEED, ball.speed + BRICK_SPEEDUP);

  if (withPowerup && ball.powerupType === 1) {
    AudioSys.laser();
    for (const b of [...G.bricks]) {
      if (Math.hypot(b.x - ball.x, b.y - ball.y) < brick.w * 1.5) destroyBrick(ball, b, false);
    }
  }

  if (Math.random() <= POWERUP_CHANCE && ball.powerupType === 0) {
    spawnPowerup(ball, brick);
  }
}

function spawnPowerup(ball, brick) {
  AudioSys.phaser();
  const type = randint(1, 4);
  if (type === 3) {
    for (const dx of [-8, 8]) {
      const nb = new Ball(brick.x + dx, brick.y, Math.max(3, G.ballR / 2));
      nb.speed = ball.speed;
      nb.vx = 0; nb.vy = nb.speed * G.speedScale / 2;
      G.balls.push(nb);
    }
  } else if (type === 4) {
    const nb = new Ball(brick.x, brick.y, G.ballR);
    nb.speed = ball.speed;
    nb.vx = 0; nb.vy = nb.speed * G.speedScale / 2;
    G.balls.push(nb);
  } else {
    const s = W > 760 ? 1 : 0.7;
    G.powerups.push({
      x: brick.x, y: brick.y, type: type,
      vy: 3.5 * G.speedScale,
      w: 46 * s, h: 20 * s,
      spawnT: G.t, pulse: 0
    });
  }
}

/* ===================== Particle effects ===================== */
function explode(brick) {
  for (const d of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
    G.particles.push({
      type: 'shard',
      x: brick.x + brick.w / 4 * d[0], y: brick.y + brick.h / 4 * d[1],
      w: brick.w / 2, h: brick.h / 2, color: brick.color,
      vx: rand(-30, 30) / 0.4, vy: rand(-30, 30) / 0.4,
      rot: 0, vr: rand(-Math.PI / 2, Math.PI / 2) / 0.4,
      age: 0, life: 0.4
    });
  }
}

function ballTrail(ball, dt60) {
  if (!ball.powerupType) return;
  const n = Math.max(1, Math.round(3 * dt60));
  for (let i = 0; i < n; i++) {
    const ang = rand(0, Math.PI * 2);
    const d = rand(0, Math.max(1, ball.r - 4));
    const hue = (d / ball.r) * 0.15 + (ball.powerupType === 2 ? 0.6 : 0.0);
    G.particles.push({ type: 'spark',
      x: ball.x + Math.cos(ang) * d, y: ball.y + Math.sin(ang) * d,
      age: 0, life: 0.2, color: hsv(hue, 0.9, 1) });
  }
}

/* ===================== Per-frame update ===================== */
function movePaddle(dt60) {
  if (keys.has('ArrowLeft'))  G.paddle.target -= 16 * dt60;
  if (keys.has('ArrowRight')) G.paddle.target += 16 * dt60;
  G.paddle.target = clamp(G.paddle.target, 0, W);
  let dx = G.paddle.target - G.paddle.x;
  const max = PADDLE_SPEED * dt60;
  if (Math.abs(dx) > max) dx = max * sign(dx);
  G.paddle.x += dx;
}

function updatePowerups(dt60) {
  const pr = paddleRect(false);
  for (const p of [...G.powerups]) {
    p.y += p.vy * dt60;
    p.pulse += dt60 * 8;

    if (p.y > H + 50) {
      G.powerups.splice(G.powerups.indexOf(p), 1);
      continue;
    }

    if (rectsOverlap(pr, { x: p.x - p.w / 2, y: p.y - p.h / 2, w: p.w, h: p.h })) {
      AudioSys.powerupCatch();
      G.paddlePowerup = p.type;
      G.paddleCharge = 3;
      G.powerups.splice(G.powerups.indexOf(p), 1);
    }
  }
}

function updateParticles(dt) {
  for (const p of [...G.particles]) {
    p.age += dt;
    if (p.age >= p.life) { G.particles.splice(G.particles.indexOf(p), 1); continue; }
    if (p.type === 'shard') { p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt; }
  }
}

function update(dt, dt60) {
  G.t += dt;
  movePaddle(dt60);
  for (const b of G.bricks) b.age += dt;

  for (const ball of [...G.balls]) {
    ball.spawnAge += dt;
    ballTrail(ball, dt60);
    const fvx = ball.vx * dt60, fvy = ball.vy * dt60;
    const steps = Math.max(1, Math.ceil(Math.hypot(fvx, fvy) / 5));
    for (let i = 0; i < steps; i++) stepBall(ball, fvx / steps, fvy / steps);
    if (ball.y > H + 50) G.balls.splice(G.balls.indexOf(ball), 1);
  }

  updatePowerups(dt60);

  if (G.balls.length === 0) ballLost();
  else if (G.bricks.length === 0) levelFinished();
}

function stepBall(ball, vx, vy) {
  let bpx = ball.x + vx, bpy = ball.y + vy;
  const r = ball.r;
  const hits = [];
  const newBall = ball.isNew;

  if (!newBall) {
    for (const b of G.bricks) {
      if (ball.lastCollision === b) continue;
      const rc = { x: b.x - b.w / 2, y: b.y - b.h / 2, w: b.w, h: b.h };
      if (hitRect(rc, bpx, bpy, r)) hits.push({ rect: rc, obj: b, type: 'brick' });
    }
    for (const wrect of G.walls) {
      if (ball.lastCollision === wrect) continue;
      if (hitRect(wrect, bpx, bpy, r)) hits.push({ rect: wrect, obj: wrect, type: 'wall' });
    }
  }

  const pr = paddleRect(true);
  if (ball.lastCollision !== 'paddle' && hitRect(pr, bpx, bpy, r))
    hits.push({ rect: pr, obj: 'paddle', type: 'paddle' });

  if (hits.length === 0) { ball.x = bpx; ball.y = bpy; return; }

  const vl = Math.hypot(vx, vy) || 1;
  const ux = vx / vl, uy = vy / vl;
  let guard = 0;
  while (guard++ < 512 && hits.some(c => hitRect(c.rect, bpx, bpy, r))) { bpx -= ux; bpy -= uy; }

  let best = null, bestPt = null, bestD = Infinity;
  for (const c of hits) {
    const pt = closestPoint(c.rect, bpx, bpy);
    const d = (pt[0] - bpx) * (pt[0] - bpx) + (pt[1] - bpy) * (pt[1] - bpy);
    if (d < bestD) { bestD = d; best = c; bestPt = pt; }
  }

  let nvx = vx, nvy = vy;

  if (best.type === 'brick') {
    destroyBrick(ball, best.obj);
    if (ball.powerupType === 2) {
      AudioSys.laser();
      ball.x = bpx; ball.y = bpy; ball.isNew = false;
      const sp = ball.speed * G.speedScale, l = Math.hypot(vx, vy) || 1;
      ball.vx = vx / l * sp; ball.vy = vy / l * sp;
      return;
    }
  }

  collisionSound(best);
  ball.lastCollision = best.obj;

  const cxr = best.rect.x + best.rect.w / 2;
  const sideHit = Math.abs(vx) > 0 && sign(bpx - cxr) !== sign(vx) &&
                  Math.abs(bpx - bestPt[0]) > Math.abs(bpy - bestPt[1]);
  if (sideHit) nvx = -vx; else nvy = -vy;

  if (best.type === 'paddle' && nvy < 0) {
    const dx = bpx - G.paddle.x;
    let ang = dx / (G.paddle.w / 3) * (Math.PI / 6);
    if (Math.abs(ang) < 0.22) ang = 0.22 * (sign(ang) || 1);
    nvx = Math.sin(ang); nvy = -Math.cos(ang);
    ball.powerupType = G.paddlePowerup;
    G.paddleCharge = Math.max(0, G.paddleCharge - 1);
    if (G.paddleCharge <= 0) G.paddlePowerup = 0;
  }

  ball.x = bpx; ball.y = bpy; ball.isNew = false;
  const sp = ball.speed * G.speedScale, l2 = Math.hypot(nvx, nvy) || 1;
  ball.vx = nvx / l2 * sp; ball.vy = nvy / l2 * sp;
}

function collisionSound(c) {
  if (c.type === 'brick') AudioSys.brick();
  else if (c.type === 'paddle') AudioSys.paddle(G.paddlePowerup > 0);
  else AudioSys.wall();
}

/* ===================== Rendering ===================== */
function bgColor() {
  if (G.filter === 1 || G.filter === 2) return '#333';
  if (G.filter === 3) return '#474e3b';
  return '#292e37';
}

function drawBrick(c, b) {
  const t = clamp((b.age - b.delay) / 0.25, 0, 1);
  if (t <= 0) return;
  const s = easeOutBack(t);
  const w = b.w - 2, h = b.h - 2;
  c.save();
  c.translate(b.x, b.y);
  c.scale(s, s);
  const g = c.createLinearGradient(0, -h / 2, 0, h / 2);
  g.addColorStop(0, shade(b.color, 1.28));
  g.addColorStop(0.5, b.color);
  g.addColorStop(1, shade(b.color, 0.68));
  roundRect(c, -w / 2, -h / 2, w, h, Math.min(6, h / 2));
  c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(0,0,0,0.28)'; c.lineWidth = 1; c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.25)';
  roundRect(c, -w / 2 + 3, -h / 2 + 2, w - 6, h * 0.28, 3); c.fill();
  c.restore();
}

function drawPaddle(c) {
  const p = G.paddle;
  const base = G.paddlePowerup === 1 ? '#e5534b'
             : G.paddlePowerup === 2 ? '#4aa3df' : '#3f8fce';
  c.save();
  c.translate(p.x, p.y);

  if (G.paddleCharge > 0) {
    const glow = c.createRadialGradient(0, 0, p.w * 0.3, 0, 0, p.w * 0.8);
    const glowCol = G.paddlePowerup === 1 ? '255,85,85' : '90,170,255';
    glow.addColorStop(0, 'rgba(' + glowCol + ',0.35)');
    glow.addColorStop(1, 'rgba(' + glowCol + ',0)');
    c.fillStyle = glow;
    c.fillRect(-p.w, -p.h * 2, p.w * 2, p.h * 4);
  }

  const g = c.createLinearGradient(0, -p.h / 2, 0, p.h / 2);
  g.addColorStop(0, shade(base, 1.4));
  g.addColorStop(0.5, base);
  g.addColorStop(1, shade(base, 0.6));
  roundRect(c, -p.w / 2, -p.h / 2, p.w, p.h, p.h / 2);
  c.fillStyle = g; c.fill();
  c.fillStyle = 'rgba(255,255,255,0.35)';
  roundRect(c, -p.w / 2 + 4, -p.h / 2 + 2, p.w - 8, p.h * 0.3, p.h * 0.15); c.fill();

  if (G.paddleCharge > 0) {
    c.fillStyle = 'rgba(255,255,255,0.9)';
    for (let i = 0; i < G.paddleCharge; i++) {
      c.beginPath();
      c.arc((i - (G.paddleCharge - 1) / 2) * 10, 0, 2.5, 0, Math.PI * 2);
      c.fill();
    }
  }
  c.restore();
}

function drawBall(c, b) {
  const s = easeOutBack(clamp(b.spawnAge / 0.3, 0, 1));
  if (s <= 0) return;
  const r = b.r * s;
  const base = b.powerupType === 1 ? '#ff6b6b'
             : b.powerupType === 2 ? '#5ac8fa' : '#6cb2f5';
  c.save();
  c.translate(b.x, b.y);
  const g = c.createRadialGradient(-r * 0.35, -r * 0.35, r * 0.1, 0, 0, r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.4, base);
  g.addColorStop(1, shade(base, 0.55));
  c.fillStyle = g;
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill();
  c.restore();
}

function drawPill(c, p) {
  const col = p.type === 1 ? '#ff5a5a' : '#5aa8ff';
  const pulse = 1 + Math.sin(p.pulse) * 0.08;
  c.save();
  c.translate(p.x, p.y);
  c.scale(pulse, pulse);

  const glow = c.createRadialGradient(0, 0, p.h * 0.5, 0, 0, p.w * 0.9);
  const glowCol = p.type === 1 ? '255,90,90' : '90,170,255';
  glow.addColorStop(0, 'rgba(' + glowCol + ',0.45)');
  glow.addColorStop(1, 'rgba(' + glowCol + ',0)');
  c.fillStyle = glow;
  c.beginPath(); c.ellipse(0, 0, p.w * 0.9, p.h * 0.9, 0, 0, Math.PI * 2); c.fill();

  const g = c.createLinearGradient(0, -p.h / 2, 0, p.h / 2);
  g.addColorStop(0, shade(col, 1.35));
  g.addColorStop(1, shade(col, 0.65));
  roundRect(c, -p.w / 2, -p.h / 2, p.w, p.h, p.h / 2);
  c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.55)'; c.lineWidth = 1.5; c.stroke();
  c.strokeStyle = 'rgba(255,255,255,0.85)'; c.lineWidth = 2;
  c.beginPath(); c.moveTo(-p.w * 0.26, 0); c.lineTo(p.w * 0.26, 0); c.stroke();
  c.restore();
}

function drawParticles(c, kind) {
  for (const p of G.particles) {
    if (p.type !== kind) continue;
    const k = 1 - p.age / p.life;
    c.save();
    if (kind === 'spark') {
      c.globalCompositeOperation = 'lighter';
      c.globalAlpha = k * 0.9;
      c.fillStyle = p.color;
      c.beginPath(); c.arc(p.x, p.y, 3.5 * k + 1, 0, Math.PI * 2); c.fill();
    } else {
      c.translate(p.x, p.y); c.rotate(p.rot);
      c.globalAlpha = k;
      c.fillStyle = p.color;
      c.fillRect(-p.w * k / 2, -p.h * k / 2, p.w * k, p.h * k);
    }
    c.restore();
  }
}

function drawWorld(c) {
  drawParticles(c, 'spark');
  for (const b of G.bricks) drawBrick(c, b);
  for (const p of G.powerups) drawPill(c, p);
  drawPaddle(c);
  for (const b of G.balls) drawBall(c, b);
  drawParticles(c, 'shard');
}

function drawHeart(c, cx, cy, size, alpha) {
  const s = size / 2;
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = '#ff4757';
  c.beginPath();
  c.moveTo(cx, cy + s * 0.95);
  c.bezierCurveTo(cx - s * 1.25, cy + s * 0.1, cx - s * 0.9, cy - s * 0.95, cx, cy - s * 0.25);
  c.bezierCurveTo(cx + s * 0.9, cy - s * 0.95, cx + s * 1.25, cy + s * 0.1, cx, cy + s * 0.95);
  c.fill();
  c.restore();
}

function drawHUD(c) {
  c.fillStyle = '#1c1c1c';
  c.fillRect(0, 0, W, HUD_H);
  c.fillStyle = 'rgba(255,255,255,0.9)';
  roundRect(c, 32 - 8, 32 - 10, 6, 20, 2); c.fill();
  roundRect(c, 32 + 2, 32 - 10, 6, 20, 2); c.fill();
  for (let i = 0; i < 3; i++) drawHeart(c, 32 + i * 36, 62, 22, G.lives > i ? 1 : 0.16);
  c.fillStyle = '#ffffff';
  c.font = '600 ' + (W > 760 ? 40 : 28) + 'px "Avenir Next","Segoe UI",system-ui,sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(String(G.score), W / 2, 45);
  c.textAlign = 'right';
  c.font = '500 14px "Avenir Next","Segoe UI",system-ui,sans-serif';
  c.fillStyle = 'rgba(255,255,255,0.45)';
  c.fillText('LEVEL ' + (G.level + 1), W - 16, 32);

  if (G.paddleCharge > 0) {
    const label = G.paddlePowerup === 1 ? 'EXPLOSIVE' : 'PIERCING';
    c.textAlign = 'left';
    c.font = '600 13px "Avenir Next","Segoe UI",system-ui,sans-serif';
    c.fillStyle = G.paddlePowerup === 1 ? '#ff6b6b' : '#5ac8fa';
    c.fillText(label + ' x' + G.paddleCharge, 16, 86);
  }
}

function composite() {
  const f = G.filter;
  if (f === 4) {
    const strip = 4;
    for (let y = 0; y < H; y += strip) {
      const h = Math.min(strip, H - y);
      const dx = Math.sin(y * 0.04 + G.t * 5) * 6;
      ctx.drawImage(off, 0, y * DPR, off.width, h * DPR, dx, y, W, h);
    }
    return;
  }
  if (f === 1)      ctx.filter = 'grayscale(1)';
  else if (f === 2) ctx.filter = 'grayscale(1) contrast(1.7) brightness(1.05)';
  else if (f === 3) ctx.filter = 'grayscale(1) sepia(1) hue-rotate(55deg) saturate(2.4) contrast(1.1)';
  ctx.drawImage(off, 0, 0, W, H);
  ctx.filter = 'none';
  if (f === 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    for (let y = HUD_H; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  }
}

function render() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = bgColor();
  ctx.fillRect(0, 0, W, H);
  octx.setTransform(DPR, 0, 0, DPR, 0, 0);
  octx.clearRect(0, 0, W, H);
  drawWorld(octx);
  composite();
  drawHUD(ctx);
}

/* ===================== Menus ===================== */
const overlay = document.getElementById('overlay');
const menuTitle = document.getElementById('menu-title');
const menuSub = document.getElementById('menu-sub');
const menuButtons = document.getElementById('menu-buttons');

function showMenu(title, sub, buttons) {
  menuTitle.textContent = title;
  menuSub.innerHTML = sub;
  menuButtons.innerHTML = '';
  buttons.forEach((label, i) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (i === 0) b.classList.add('primary');
    b.addEventListener('click', () => menuButton(label, b));
    menuButtons.appendChild(b);
  });
  overlay.classList.remove('hidden');
}
function hideMenu() { overlay.classList.add('hidden'); }

function menuButton(title, btn) {
  AudioSys.ensure();
  if (title.indexOf('Filter:') === 0) {
    G.filter = (G.filter + 1) % FILTER_NAMES.length;
    btn.textContent = 'Filter: ' + FILTER_NAMES[G.filter];
    document.body.style.background = bgColor();
    return;
  }
  if (title === 'Continue' || title === 'Play' || title === 'New Game') {
    hideMenu();
    if (title !== 'Continue') newGame();
    G.state = 'playing';
  }
}

function pauseGame() {
  if (G.state !== 'playing') return;
  G.state = 'paused';
  showMenu('Paused', 'Highscore: ' + G.highscore,
           ['Continue', 'New Game', 'Filter: ' + FILTER_NAMES[G.filter]]);
}

/* ===================== Input ===================== */
window.addEventListener('mousemove', e => { G.paddle.target = e.clientX; });
window.addEventListener('mousedown', e => {
  AudioSys.ensure();
  if (e.clientX < 48 && e.clientY < 48) { pauseGame(); return; }
  G.paddle.target = e.clientX;
});
window.addEventListener('touchstart', e => {
  AudioSys.ensure();
  const t = e.touches[0];
  if (t.clientX < 48 && t.clientY < 48) { pauseGame(); return; }
  G.paddle.target = t.clientX;
  e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', e => {
  G.paddle.target = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') keys.add(e.key);
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
    if (G.state === 'playing') pauseGame();
    else if (G.state === 'paused') { hideMenu(); G.state = 'playing'; }
  }
});
window.addEventListener('keyup', e => keys.delete(e.key));
document.addEventListener('visibilitychange', () => { if (document.hidden) pauseGame(); });
window.addEventListener('resize', resize);

/* ===================== Main loop ===================== */
let lastT = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const now = ts / 1000;
  let dt = Math.min(now - lastT, 0.05);
  lastT = now;
  if (G.state === 'playing') update(dt, dt * 60);
  updateParticles(dt);
  render();
}

/* ===================== Start ===================== */
loadHigh();
resize();
G.paddle.x = W / 2;
G.paddle.target = W / 2;
showMenu('BrickBreaker', 'Highscore: ' + G.highscore,
         ['Play', 'Filter: ' + FILTER_NAMES[G.filter]]);
requestAnimationFrame(ts => { lastT = ts / 1000; requestAnimationFrame(frame); });
</script>
